name: hyperion-relay-ci

# Runs on every PR — this is the real "sandbox tests" run the client sees
# when the Remediation Agent opens a fix PR against this (demo) repo.
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  sandbox-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install pyyaml pytest
      - name: Run sandbox tests
        run: pytest -q tests/

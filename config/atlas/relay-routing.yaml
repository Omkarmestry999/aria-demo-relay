# Atlas issuer-relay routing — DEMO / mock config (stand-in for a card processor).
# This is the file the Remediation Agent edits during a fix (active_relay_path).
active_relay_path: primary

paths:
  primary:
    host: relay-primary.internal
    timeout_ms: 4000
  secondary:
    host: relay-secondary.internal
    timeout_ms: 4000

issuers:
  KST: { name: "Kestrel" }
  VLA: { name: "Client B" }
  SBL: { name: "Client C" }
